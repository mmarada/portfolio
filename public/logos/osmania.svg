<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#1a1a1a" stroke-width="4"/>
  <circle cx="100" cy="100" r="86" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Gear teeth around outer ring -->
  <circle cx="100" cy="100" r="91" fill="none" stroke="#1a1a1a" stroke-width="8" stroke-dasharray="6 5.2" stroke-dashoffset="0"/>

  <!-- Arc text: COLLEGE OF ENGINEERING (top) -->
  <path id="topArc" d="M 24,100 A 76,76 0 0,1 176,100" fill="none"/>
  <text font-family="serif" font-size="11" font-weight="bold" fill="#1a1a1a" letter-spacing="2">
    <textPath href="#topArc" startOffset="2%">COLLEGE OF ENGINEERING</textPath>
  </text>

  <!-- Arc text: OSMANIA UNIVERSITY (bottom) -->
  <path id="bottomArc" d="M 22,108 A 78,78 0 0,0 178,108" fill="none"/>
  <text font-family="serif" font-size="11" font-weight="bold" fill="#1a1a1a" letter-spacing="2">
    <textPath href="#bottomArc" startOffset="8%">OSMANIA UNIVERSITY</textPath>
  </text>

  <!-- Stars -->
  <text x="36" y="108" font-size="10" fill="#1a1a1a" text-anchor="middle">★</text>
  <text x="164" y="108" font-size="10" fill="#1a1a1a" text-anchor="middle">★</text>

  <!-- Torch flame -->
  <ellipse cx="100" cy="62" rx="10" ry="14" fill="#1a1a1a" opacity="0.8"/>
  <ellipse cx="100" cy="60" rx="6" ry="10" fill="#444"/>
  <ellipse cx="100" cy="56" rx="4" ry="7" fill="#888"/>

  <!-- Torch handle (hand holding) -->
  <rect x="96" y="74" width="8" height="28" rx="3" fill="#1a1a1a"/>
  <!-- Simplified hand/grip -->
  <rect x="93" y="88" width="14" height="10" rx="4" fill="#1a1a1a"/>
  <rect x="91" y="94" width="18" height="7" rx="3" fill="#1a1a1a"/>

  <!-- Banner bottom -->
  <path d="M 55,150 Q 100,145 145,150 Q 148,158 145,162 Q 100,157 55,162 Q 52,158 55,150Z" fill="#1a1a1a"/>
  <!-- Banner wings -->
  <path d="M 30,148 Q 55,145 55,150 Q 55,162 50,165 Q 30,158 30,148Z" fill="#1a1a1a"/>
  <path d="M 170,148 Q 145,145 145,150 Q 145,162 150,165 Q 170,158 170,148Z" fill="#1a1a1a"/>

  <!-- Banner text -->
  <text x="100" y="159" font-family="serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">LUCEAT LUX VESTRA</text>
</svg>
